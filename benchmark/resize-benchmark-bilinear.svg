<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1120" viewBox="0 0 1280 1120" role="img" aria-labelledby="title desc">
  <title id="title">SGL resize benchmark bilinear comparison</title>
  <desc id="desc">bilinear resize benchmark snapshot measured from benchmark/resize-benchmark.csv. The chart compares 4-channel downscale and upscale rows.</desc>
  <defs>
    <style>
      .bg { fill: #101418; }
      .panel { fill: #171d23; stroke: #34424a; stroke-width: 1.5; }
      .header { fill: #1f262e; }
      .line { stroke: #34424a; stroke-width: 1; }
      .text { fill: #eef4f3; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; }
      .muted { fill: #9ba9a7; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; }
      .small { fill: #9ba9a7; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; font-size: 12px; }
      .cell { fill: #eef4f3; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; font-size: 14px; font-weight: 650; }
      .head { fill: #c6d4d1; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; font-size: 12px; font-weight: 800; }
      .speed { fill: #facc15; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; font-size: 14px; font-weight: 800; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="1120"/>

  <text class="text" x="36" y="52" font-size="30" font-weight="800">SGL Resize Benchmark: bilinear</text>
  <text class="muted" x="36" y="80" font-size="14">Average latency from benchmark/resize-benchmark.csv, Release build, resource/sample.png</text>
  <text class="muted" x="36" y="102" font-size="13">4-channel SGL rows; 640x480 downscale and 2560x1440 upscale are shown together.</text>
  <rect class="panel" x="28" y="132" width="1224" height="240" rx="8"/>
  <text class="text" x="58" y="172" font-size="22" font-weight="800">bilinear path comparison</text>
  <text class="muted" x="58" y="194" font-size="13">4-channel rows; external columns are filled when Cairo/NE10 compare rows exist.</text>
  <rect class="header" x="48" y="216" width="1184" height="38" rx="6"/>
  <text class="head" x="70" y="240">direction</text>
  <text class="head" x="270" y="240" text-anchor="end">generic 1t</text>
  <text class="head" x="395" y="240" text-anchor="end">simd 1t</text>
  <text class="head" x="540" y="240" text-anchor="end">simd-lut 1t</text>
  <text class="head" x="685" y="240" text-anchor="end">simd-lut 8t</text>
  <text class="head" x="825" y="240" text-anchor="end">generic/lut8</text>
  <text class="head" x="955" y="240" text-anchor="end">lut 1t/8t</text>
  <text class="head" x="1065" y="240" text-anchor="end">cairo 1t</text>
  <text class="head" x="1200" y="240" text-anchor="end">ne10 1t</text>
  <line class="line" x1="48" y1="262" x2="1232" y2="262"/>
  <text class="cell" x="70" y="290">downscale 640x480</text>
  <text class="cell" x="270" y="290" text-anchor="end">0.701 ms</text>
  <text class="cell" x="395" y="290" text-anchor="end">0.581 ms</text>
  <text class="cell" x="540" y="290" text-anchor="end">0.621 ms</text>
  <text class="cell" x="685" y="290" text-anchor="end">0.316 ms</text>
  <text class="speed" x="825" y="290" text-anchor="end">2.22x</text>
  <text class="speed" x="955" y="290" text-anchor="end">1.97x</text>
  <text class="cell" x="1065" y="290" text-anchor="end">0.364 ms</text>
  <text class="cell" x="1200" y="290" text-anchor="end">0.759 ms</text>
  <line class="line" x1="48" y1="310" x2="1232" y2="310"/>
  <text class="cell" x="70" y="338">upscale 2560x1440</text>
  <text class="cell" x="270" y="338" text-anchor="end">3.943 ms</text>
  <text class="cell" x="395" y="338" text-anchor="end">3.180 ms</text>
  <text class="cell" x="540" y="338" text-anchor="end">3.732 ms</text>
  <text class="cell" x="685" y="338" text-anchor="end">1.400 ms</text>
  <text class="speed" x="825" y="338" text-anchor="end">2.82x</text>
  <text class="speed" x="955" y="338" text-anchor="end">2.67x</text>
  <text class="cell" x="1065" y="338" text-anchor="end">3.667 ms</text>
  <text class="cell" x="1200" y="338" text-anchor="end">4.683 ms</text>
  <rect class="panel" x="28" y="410" width="1224" height="310" rx="8"/>
  <text class="text" x="58" y="450" font-size="22" font-weight="800">bilinear downscale 640x480 latency comparison</text>
  <text class="muted" x="58" y="472" font-size="13">SGL paths and available Cairo/NE10 rows; bars are normalized to the slowest displayed row.</text>
  <text class="small" x="78" y="529">generic 1t</text>
  <rect x="360" y="516" width="702" height="16" rx="3" fill="#38bdf8"/>
  <text class="cell" x="1076" y="529">0.701 ms</text>
  <text class="small" x="78" y="559">simd 1t</text>
  <rect x="360" y="546" width="582" height="16" rx="3" fill="#fb7185"/>
  <text class="cell" x="956" y="559">0.581 ms</text>
  <text class="small" x="78" y="589">simd-lut 1t</text>
  <rect x="360" y="576" width="622" height="16" rx="3" fill="#a78bfa"/>
  <text class="cell" x="996" y="589">0.621 ms</text>
  <text class="small" x="78" y="619">simd-lut 8t</text>
  <rect x="360" y="606" width="316" height="16" rx="3" fill="#4ade80"/>
  <text class="cell" x="690" y="619">0.316 ms</text>
  <text class="small" x="78" y="649">cairo 1t</text>
  <rect x="360" y="636" width="364" height="16" rx="3" fill="#f97316"/>
  <text class="cell" x="738" y="649">0.364 ms</text>
  <text class="small" x="78" y="679">ne10 1t</text>
  <rect x="360" y="666" width="760" height="16" rx="3" fill="#60a5fa"/>
  <text class="cell" x="1134" y="679">0.759 ms</text>
  <rect class="panel" x="28" y="750" width="1224" height="310" rx="8"/>
  <text class="text" x="58" y="790" font-size="22" font-weight="800">bilinear upscale 2560x1440 latency comparison</text>
  <text class="muted" x="58" y="812" font-size="13">SGL paths and available Cairo/NE10 rows; bars are normalized to the slowest displayed row.</text>
  <text class="small" x="78" y="869">generic 1t</text>
  <rect x="360" y="856" width="640" height="16" rx="3" fill="#38bdf8"/>
  <text class="cell" x="1014" y="869">3.943 ms</text>
  <text class="small" x="78" y="899">simd 1t</text>
  <rect x="360" y="886" width="516" height="16" rx="3" fill="#fb7185"/>
  <text class="cell" x="890" y="899">3.180 ms</text>
  <text class="small" x="78" y="929">simd-lut 1t</text>
  <rect x="360" y="916" width="606" height="16" rx="3" fill="#a78bfa"/>
  <text class="cell" x="980" y="929">3.732 ms</text>
  <text class="small" x="78" y="959">simd-lut 8t</text>
  <rect x="360" y="946" width="227" height="16" rx="3" fill="#4ade80"/>
  <text class="cell" x="601" y="959">1.400 ms</text>
  <text class="small" x="78" y="989">cairo 1t</text>
  <rect x="360" y="976" width="595" height="16" rx="3" fill="#f97316"/>
  <text class="cell" x="969" y="989">3.667 ms</text>
  <text class="small" x="78" y="1019">ne10 1t</text>
  <rect x="360" y="1006" width="760" height="16" rx="3" fill="#60a5fa"/>
  <text class="cell" x="1134" y="1019">4.683 ms</text>
  <text class="small" x="36" y="1098">Note: benchmark results are workload and environment dependent; rerun on the target machine before publishing final claims.</text>
</svg>
